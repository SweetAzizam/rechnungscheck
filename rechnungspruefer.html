<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RechnungsCheck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8d5a3;
    --accent2: #c4a96b;
    --text: #f0ece4;
    --text-muted: #8a8070;
    --green: #4caf7d;
    --red: #e05c5c;
    --yellow: #e8b84b;
    --blue: #5c9fe0;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(232,213,163,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(92,159,224,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 36px;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 18px;
    margin-bottom: 28px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 300;
    max-width: 360px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Upload Zone */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(232,213,163,0.04) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent2);
    background: var(--surface2);
  }

  .upload-zone:hover::before, .upload-zone.dragover::before {
    opacity: 1;
  }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
  }

  .upload-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }

  .upload-sub {
    font-size: 13px;
    color: var(--text-muted);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  /* File info */
  .file-info {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    align-items: center;
    gap: 14px;
  }

  .file-info.visible { display: flex; }

  .file-icon {
    width: 40px;
    height: 40px;
    background: rgba(232,213,163,0.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .file-details { flex: 1; min-width: 0; }

  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-size {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .file-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
  }

  .file-remove:hover { color: var(--red); }

  /* Analyze Button */
  .btn-analyze {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 14px;
    padding: 18px 24px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 32px;
    letter-spacing: 0.01em;
  }

  .btn-analyze:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 24px;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 15px;
    color: var(--text-muted);
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
  }

  .score-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .score-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Section Cards */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideUp 0.4s ease forwards;
    opacity: 0;
    transform: translateY(12px);
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .section-card:nth-child(1) { animation-delay: 0.05s; }
  .section-card:nth-child(2) { animation-delay: 0.1s; }
  .section-card:nth-child(3) { animation-delay: 0.15s; }
  .section-card:nth-child(4) { animation-delay: 0.2s; }
  .section-card:nth-child(5) { animation-delay: 0.25s; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }

  .section-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .section-icon.ok { background: rgba(76,175,125,0.15); }
  .section-icon.warn { background: rgba(232,184,75,0.15); }
  .section-icon.error { background: rgba(224,92,92,0.15); }
  .section-icon.info { background: rgba(92,159,224,0.15); }

  .section-label {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
  }

  .section-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-ok { background: rgba(76,175,125,0.15); color: var(--green); }
  .status-warn { background: rgba(232,184,75,0.15); color: var(--yellow); }
  .status-error { background: rgba(224,92,92,0.15); color: var(--red); }

  .section-chevron {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .section-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .section-body.open { display: block; }

  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.5;
  }

  .check-item:last-child { border-bottom: none; }

  .check-icon { flex-shrink: 0; margin-top: 2px; font-size: 15px; }

  .check-label { flex: 1; color: var(--text); }
  .check-detail { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* Summary bar */
  .summary-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .summary-item {
    flex: 1;
    min-width: 80px;
    text-align: center;
  }

  .summary-count {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .summary-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Reset button */
  .btn-reset {
    width: 100%;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }

  .btn-reset:hover { color: var(--text); border-color: var(--text-muted); }

  /* Footer */
  footer {
    text-align: center;
    padding-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* Error state */
  .error-box {
    display: none;
    background: rgba(224,92,92,0.08);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 14px;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .error-box.visible { display: block; }

  @media (max-width: 480px) {
    .app { padding: 16px 12px 48px; }
    header { padding: 28px 0 24px; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-badge">
      <span class="logo-dot"></span>
      KI-gestützte Analyse
    </div>
    <h1>Rechnungs<em>check</em></h1>
    <p class="subtitle">Lade eine Lieferantenrechnung hoch – die KI prüft sie vollständig in Sekunden.</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg">
    <span class="upload-icon">📄</span>
    <div class="upload-title">Rechnung hier ablegen</div>
    <div class="upload-sub">PDF, PNG oder JPG · Tippen zum Auswählen</div>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-icon">📎</div>
    <div class="file-details">
      <div class="file-name" id="fileName">–</div>
      <div class="file-size" id="fileSize">–</div>
    </div>
    <button class="file-remove" id="fileRemove" onclick="removeFile()">✕</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <button class="btn-analyze" id="btnAnalyze" onclick="analyze()" disabled>
    <span>🔍</span> Rechnung prüfen
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">KI analysiert die Rechnung …</div>
  </div>

  <!-- Results -->
  <div class="results" id="results"></div>

  <footer>RechnungsCheck · Powered by Claude AI · Alle Daten bleiben privat</footer>

</div>

<script>
let selectedFile = null;

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const btnAnalyze = document.getElementById('btnAnalyze');
const loading = document.getElementById('loading');
const results = document.getElementById('results');
const errorBox = document.getElementById('errorBox');

// Drag & Drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});

function setFile(file) {
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  fileInfo.classList.add('visible');
  btnAnalyze.disabled = false;
  errorBox.classList.remove('visible');
}

function removeFile() {
  selectedFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('visible');
  btnAnalyze.disabled = true;
  results.classList.remove('visible');
  results.innerHTML = '';
  errorBox.classList.remove('visible');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('visible');
}

// Compress images before sending to API (max 1200px, quality 0.82)
async function prepareFile(file) {
  const isPDF = file.type === 'application/pdf';
  if (isPDF) {
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = () => rej(new Error('Lesefehler'));
      r.readAsDataURL(file);
    });
    return { base64, mediaType: 'application/pdf', isPDF: true };
  }

  // For images: resize + compress via canvas
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      res({ base64: dataUrl.split(',')[1], mediaType: 'image/jpeg', isPDF: false });
    };
    img.onerror = () => rej(new Error('Bild konnte nicht geladen werden'));
    img.src = url;
  });
}


async function analyze() {
  if (!selectedFile) return;

  btnAnalyze.disabled = true;
  loading.classList.add('visible');
  results.classList.remove('visible');
  results.innerHTML = '';
  errorBox.classList.remove('visible');

  // Live progress steps so user sees something happening
  const steps = ['Bild wird vorbereitet …', 'Rechnung wird gelesen …', 'Pflichtangaben werden geprüft …', 'Beträge werden geprüft …', 'Ergebnis wird aufbereitet …'];
  let stepIdx = 0;
  const loadingText = document.querySelector('.loading-text');
  const stepTimer = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, steps.length - 1);
    if (loadingText) loadingText.textContent = steps[stepIdx];
  }, 2500);

  try {
    if (loadingText) loadingText.textContent = steps[0];
    const { base64, mediaType, isPDF } = await prepareFile(selectedFile);

    const systemPrompt = `Du bist ein präziser Rechnungsprüfer für deutsche Unternehmensrechnungen. Analysiere die vorgelegte Rechnung vollständig und antworte NUR mit einem JSON-Objekt, ohne Markdown-Backticks oder sonstige Erklärungen.

Das JSON muss exakt diese Struktur haben:
{
  "gesamtstatus": "ok" | "warnung" | "fehler",
  "zusammenfassung": { "ok": Zahl, "warnungen": Zahl, "fehler": Zahl },
  "abschnitte": [
    {
      "id": "pflichtangaben",
      "titel": "Pflichtangaben",
      "status": "ok" | "warnung" | "fehler",
      "icon": "📋",
      "punkte": [
        { "status": "ok"|"warn"|"error"|"info", "label": "Kurztext", "detail": "optionaler Detailtext" }
      ]
    }
  ]
}

Prüfe diese 5 Bereiche als Abschnitte:
1. pflichtangaben – Vollständige Pflichtangaben nach §14 UStG: Firmenname & Adresse Aussteller, Firmenname & Adresse Empfänger, Steuernummer oder USt-IdNr, Rechnungsdatum, Rechnungsnummer, Leistungsbeschreibung
2. rechenprüfung – Nettobetrag, MwSt-Satz und -Betrag, Bruttobetrag, Einzelpositionen und ihre Summe
3. leistungszeitraum – Leistungsdatum oder Leistungszeitraum vorhanden, plausibel, nicht zu weit in der Vergangenheit
4. zahlungskonditionen – Zahlungsziel, Fälligkeit, Bankverbindung (IBAN/BIC), mögliche Skonto-Angaben
5. auffaelligkeiten – Ungewöhnliche Positionen, verdächtige Beträge, Inkonsistenzen, fehlende Details bei teuren Positionen

Bewerte jeden Punkt als: ok (alles korrekt), warn (vorhanden aber prüfenswert), error (fehlt oder falsch), info (neutrale Information).
Sei präzise und nenne konkrete Werte aus der Rechnung wo möglich.`;

    const userContent = [
      {
        type: isPDF ? 'document' : 'image',
        source: { type: 'base64', media_type: mediaType, data: base64 }
      },
      { type: 'text', text: 'Bitte prüfe diese Rechnung vollständig und antworte nur mit dem JSON.' }
    ];

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 45000);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        stream: true,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API-Fehler');
    }

    // Read stream and collect full text
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let rawText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const evt = JSON.parse(data);
          if (evt.type === 'content_block_delta' && evt.delta?.text) {
            rawText += evt.delta.text;
          }
        } catch {}
      }
    }

    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderResults(parsed);

  } catch (err) {
    if (err.name === 'AbortError') {
      showError('⏱ Zeitüberschreitung (45s) – bitte versuche es erneut oder verwende eine kleinere Datei.');
    } else {
      showError('Fehler bei der Analyse: ' + err.message);
    }
  } finally {
    clearInterval(stepTimer);
    loading.classList.remove('visible');
    btnAnalyze.disabled = false;
  }
}

function statusIcon(s) {
  return s === 'ok' ? '✅' : s === 'warn' ? '⚠️' : s === 'error' ? '❌' : 'ℹ️';
}

function renderResults(data) {
  const zs = data.zusammenfassung || {};
  const gesamtColor = data.gesamtstatus === 'ok' ? 'var(--green)' : data.gesamtstatus === 'fehler' ? 'var(--red)' : 'var(--yellow)';
  const gesamtLabel = data.gesamtstatus === 'ok' ? 'Bestanden' : data.gesamtstatus === 'fehler' ? 'Fehler gefunden' : 'Prüfen';

  let html = `
    <div class="results-header">
      <div class="results-title">Prüfergebnis</div>
      <div class="score-badge">
        <span class="score-dot" style="background:${gesamtColor}"></span>
        ${gesamtLabel}
      </div>
    </div>

    <div class="summary-bar">
      <div class="summary-item">
        <div class="summary-count" style="color:var(--green)">${zs.ok ?? 0}</div>
        <div class="summary-label">OK</div>
      </div>
      <div class="summary-item">
        <div class="summary-count" style="color:var(--yellow)">${zs.warnungen ?? 0}</div>
        <div class="summary-label">Warnungen</div>
      </div>
      <div class="summary-item">
        <div class="summary-count" style="color:var(--red)">${zs.fehler ?? 0}</div>
        <div class="summary-label">Fehler</div>
      </div>
    </div>
  `;

  (data.abschnitte || []).forEach((sec, i) => {
    const statusClass = sec.status === 'ok' ? 'ok' : sec.status === 'fehler' ? 'error' : 'warn';
    const statusLabel = sec.status === 'ok' ? 'OK' : sec.status === 'fehler' ? 'Fehler' : 'Prüfen';

    let punkteHtml = '';
    (sec.punkte || []).forEach(p => {
      punkteHtml += `
        <div class="check-item">
          <span class="check-icon">${statusIcon(p.status)}</span>
          <div>
            <div class="check-label">${p.label}</div>
            ${p.detail ? `<div class="check-detail">${p.detail}</div>` : ''}
          </div>
        </div>
      `;
    });

    html += `
      <div class="section-card">
        <div class="section-header" onclick="toggleSection('sec${i}', this)">
          <div class="section-icon ${statusClass}">${sec.icon || '📋'}</div>
          <div class="section-label">${sec.titel}</div>
          <span class="section-status status-${statusClass}">${statusLabel}</span>
          <span class="section-chevron" id="chev${i}">▼</span>
        </div>
        <div class="section-body" id="sec${i}">
          ${punkteHtml}
        </div>
      </div>
    `;
  });

  html += `<button class="btn-reset" onclick="resetAll()">↩ Neue Rechnung prüfen</button>`;

  results.innerHTML = html;
  results.classList.add('visible');

  // Auto-open first section with issues
  const firstError = (data.abschnitte || []).findIndex(s => s.status !== 'ok');
  if (firstError >= 0) {
    document.getElementById(`sec${firstError}`)?.classList.add('open');
  } else {
    document.getElementById('sec0')?.classList.add('open');
  }
}

function toggleSection(id, header) {
  const body = document.getElementById(id);
  const i = id.replace('sec', '');
  const chev = document.getElementById('chev' + i);
  body.classList.toggle('open');
  chev.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

function resetAll() {
  removeFile();
  results.classList.remove('visible');
  results.innerHTML = '';
  loading.classList.remove('visible');
}
</script>
</body>
</html>
